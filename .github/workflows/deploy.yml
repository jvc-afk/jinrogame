name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main   # Deploy tự động mỗi khi push lên branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENSEI_AI_MVP }}
          channelId: live
          projectId: sensei-ai-mvp
